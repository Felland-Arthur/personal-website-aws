AWSTemplateFormatVersion: '2010-09-09'
Description: 'CloudFormation template for Felland Arthur portfolio website using existing S3 bucket (no custom domain)'

Parameters:
  ExistingS3Bucket:
    Type: String
    Default: 'felland-ak'
    Description: 'Name of the existing S3 bucket containing website files'

Resources:
  # Origin Access Identity for CloudFront to access private S3 bucket
  CloudFrontOAI:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: 'OAI for portfolio website'

  # S3 Bucket Policy to allow CloudFront access to existing bucket
  S3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ExistingS3Bucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              CanonicalUser: !GetAtt CloudFrontOAI.S3CanonicalUserId
            Action: s3:GetObject
            Resource: !Sub 'arn:aws:s3:::${ExistingS3Bucket}/*'

  # CloudFront Distribution (using default CloudFront certificate)
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Comment: 'CloudFront distribution for portfolio website'
        Enabled: true
        HttpVersion: http2
        IPV6Enabled: true
        PriceClass: PriceClass_All
        DefaultRootObject: index.html
        
        Origins:
          - DomainName: !Sub '${ExistingS3Bucket}.s3.${AWS::Region}.amazonaws.com'
            Id: WebsiteOrigin
            S3OriginConfig:
              OriginAccessIdentity: !Sub 'origin-access-identity/cloudfront/${CloudFrontOAI}'
        
        DefaultCacheBehavior:
          TargetOriginId: WebsiteOrigin
          ViewerProtocolPolicy: redirect-to-https  # Still enforce HTTPS
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          Compress: true
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          MinTTL: 0
          DefaultTTL: 86400
          MaxTTL: 31536000
        
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 404
            ResponsePagePath: /index.html
          - ErrorCode: 403
            ResponseCode: 403
            ResponsePagePath: /index.html

  # CloudWatch Dashboard
  WebsiteDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub 'portfolio-website-dashboard-${AWS::StackName}'
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric",
              "x": 0,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/CloudFront", "Requests", "DistributionId", "${CloudFrontDistribution}", "Region", "Global" ],
                  [ ".", "TotalErrorRate", ".", ".", ".", "." ],
                  [ ".", "4xxErrorRate", ".", ".", ".", "." ],
                  [ ".", "5xxErrorRate", ".", ".", ".", "." ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "us-east-1",
                "title": "CloudFront Requests & Error Rates",
                "period": 300
              }
            },
            {
              "type": "metric",
              "x": 0,
              "y": 6,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/CloudFront", "BytesDownloaded", "DistributionId", "${CloudFrontDistribution}", "Region", "Global" ],
                  [ ".", "BytesUploaded", ".", ".", ".", "." ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "us-east-1",
                "title": "Data Transfer",
                "period": 300
              }
            },
            {
              "type": "metric",
              "x": 12,
              "y": 0,
              "width": 12,
              "height": 6,
              "properties": {
                "metrics": [
                  [ "AWS/CloudFront", "CacheHitRate", "DistributionId", "${CloudFrontDistribution}", "Region", "Global" ]
                ],
                "view": "timeSeries",
                "stacked": false,
                "region": "us-east-1",
                "title": "Cache Hit Rate",
                "period": 300
              }
            }
          ]
        }

  # CloudWatch Alarm for High Error Rate
  HighErrorRateAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub 'portfolio-website-high-error-rate-${AWS::StackName}'
      AlarmDescription: 'Alarm when website error rate exceeds 5%'
      MetricName: TotalErrorRate
      Namespace: AWS/CloudFront
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 5.0
      ComparisonOperator: GreaterThanThreshold
      Dimensions:
        - Name: DistributionId
          Value: !Ref CloudFrontDistribution
        - Name: Region
          Value: Global

Outputs:
  CloudFrontDomain:
    Description: 'CloudFront Distribution Domain Name (use this to access your website)'
    Value: !GetAtt CloudFrontDistribution.DomainName
  
  CloudFrontDistributionId:
    Description: 'CloudFront Distribution ID'
    Value: !Ref CloudFrontDistribution
  
  WebsiteURL:
    Description: 'Full website URL with HTTPS'
    Value: !Sub 'https://${CloudFrontDistribution.DomainName}'
  
  CloudWatchDashboard:
    Description: 'CloudWatch Dashboard URL'
    Value: !Sub 'https://console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=portfolio-website-dashboard-${AWS::StackName}'
  
  S3BucketName:
    Description: 'S3 Bucket being used'
    Value: !Ref ExistingS3Bucket